<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatoire Télécom France</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <header>
        <h1>Observatoire Télécom France</h1>
        <p class="subtitle">Couverture et qualité des réseaux mobiles</p>
    </header>

    <nav class="controls">
        <div class="control-group">
            <label for="operator-select">Opérateur</label>
            <select id="operator-select">
                <option value="OF">Orange</option>
                <option value="BYT">Bouygues Telecom</option>
                <option value="FREE">Free Mobile</option>
                <option value="SFR">SFR</option>
            </select>
        </div>
        <div class="control-group">
            <label for="tech-select">Technologie</label>
            <select id="tech-select">
                <option value="4G" selected>4G</option>
                <option value="2G">2G</option>
                <option value="3G">3G</option>
                <option value="5G">5G</option>
            </select>
        </div>
        <button onclick="loadData()">Afficher</button>
        <button onclick="loadAllOperators()" class="btn-secondary">Tous les opérateurs</button>
    </nav>

    <main>
        <div class="dashboard">
            <section class="map-container">
                <h2>Carte de couverture</h2>
                <div id="map"></div>
            </section>

            <section class="charts-container">
                <div class="chart-box chart-box-full">
                    <h2>Polygones de couverture par opérateur</h2>
                    <canvas id="coverage-chart"></canvas>
                </div>
            </section>
        </div>

        <section class="stats-section">
            <h2>Statistiques de la base</h2>
            <div id="stats-grid" class="stats-grid">
                <p class="placeholder">Chargement...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>Données : ARCEP / ANFR — Licence Ouverte</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/js/map.js"></script>
    <script src="/js/charts.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
