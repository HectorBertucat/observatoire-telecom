<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatoire Telecom France</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
</head>
<body>
    <header>
        <div>
            <h1>Observatoire Telecom France</h1>
            <span class="header-subtitle">Couverture et qualite des reseaux mobiles</span>
        </div>
        <span class="header-badge">v0.1.0</span>
    </header>

    <div class="app-layout">
        <!-- Side Panel -->
        <aside class="side-panel">
            <!-- Operators -->
            <div class="panel-section">
                <div class="panel-section-title">Operateurs</div>
                <div id="operator-toggles"></div>
            </div>

            <hr class="panel-divider">

            <!-- Department -->
            <div class="panel-section">
                <div class="panel-section-title">Departement</div>
                <select id="dept-select" class="panel-select" onchange="selectDepartment()">
                    <option value="">National</option>
                </select>
            </div>

            <!-- Commune -->
            <div class="panel-section">
                <div class="panel-section-title">Commune (code INSEE)</div>
                <div style="display:flex;gap:6px">
                    <input type="text" id="commune-input" class="panel-input"
                        placeholder="ex: 31555" maxlength="5" style="flex:1">
                    <button onclick="searchCommune()" class="btn btn-ghost btn-sm">Go</button>
                </div>
            </div>

            <hr class="panel-divider">

            <!-- Quick stats -->
            <div class="panel-section">
                <div class="panel-section-title">Donnees</div>
                <div id="panel-stats"></div>
            </div>

            <hr class="panel-divider">

            <!-- Actions -->
            <div class="panel-section">
                <div class="panel-section-title">Actions</div>
                <div class="btn-row">
                    <button onclick="resetView()" class="btn btn-ghost btn-sm" style="flex:1">France</button>
                    <button onclick="exportCSV()" class="btn btn-ghost btn-sm" style="flex:1">CSV</button>
                </div>
            </div>
        </aside>

        <!-- Main content -->
        <div class="main-content">
            <div id="map">
                <div id="zoom-indicator" class="zoom-indicator">z5.5</div>
                <div id="map-legend" class="map-legend"></div>
            </div>

            <div class="bottom-panel">
                <div class="chart-card">
                    <div class="chart-title">Sites d'antennes par operateur</div>
                    <canvas id="antennas-chart"></canvas>
                </div>
                <div class="chart-card">
                    <div class="chart-title">Repartition par technologie</div>
                    <canvas id="tech-chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <footer>
        Donnees ARCEP / ANFR — Licence Ouverte | Clic droit = antennes proches
    </footer>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/js/map.js"></script>
    <script src="/js/charts.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
