<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatoire Télécom France</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
</head>
<body>
    <header>
        <h1>Observatoire Télécom France</h1>
        <p class="subtitle">Couverture et qualité des réseaux mobiles</p>
    </header>

    <nav class="controls">
        <div class="control-group">
            <label for="operator-select">Opérateur</label>
            <select id="operator-select">
                <option value="all" selected>Tous</option>
                <option value="OF">Orange</option>
                <option value="BYT">Bouygues Telecom</option>
                <option value="FREE">Free Mobile</option>
                <option value="SFR">SFR</option>
            </select>
        </div>
        <div class="control-group">
            <label for="tech-select">Technologie</label>
            <select id="tech-select">
                <option value="4G" selected>4G</option>
            </select>
        </div>
        <button onclick="applyFilter()">Afficher</button>
        <button onclick="resetView()" class="btn-secondary">France</button>
        <div class="control-group">
            <label for="dept-select">Département</label>
            <select id="dept-select" onchange="selectDepartment()">
                <option value="">-- National --</option>
            </select>
        </div>
        <div class="control-group">
            <label for="commune-input">Commune (INSEE)</label>
            <div style="display:flex;gap:4px">
                <input type="text" id="commune-input" placeholder="ex: 31555"
                    maxlength="5" style="width:90px;padding:0.5rem;border:1px solid #e2e8f0;border-radius:8px;font-size:0.9rem">
                <button onclick="searchCommune()" class="btn-secondary">Go</button>
            </div>
        </div>
    </nav>

    <main>
        <div class="dashboard">
            <section class="map-container">
                <h2>Carte de couverture</h2>
                <div id="map">
                    <div id="zoom-indicator" class="zoom-indicator">z5.5</div>
                    <div id="map-legend" class="map-legend"></div>
                </div>
            </section>

            <section class="charts-container">
                <div class="chart-box chart-box-full">
                    <h2>Sites d'antennes par opérateur</h2>
                    <canvas id="antennas-chart"></canvas>
                </div>
            </section>
        </div>

        <section class="stats-section">
            <h2>Statistiques de la base</h2>
            <div id="stats-grid" class="stats-grid">
                <p class="placeholder">Chargement...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>Données : ARCEP / ANFR — Licence Ouverte | Clic droit sur la carte = antennes proches</p>
    </footer>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/js/map.js"></script>
    <script src="/js/charts.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
