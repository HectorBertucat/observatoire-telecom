services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data/observatoire.duckdb:/app/data/observatoire.duckdb:ro
    environment:
      - OBS_DB_PATH=/app/data/observatoire.duckdb
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - api
